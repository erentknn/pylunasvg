[build-system]
requires = [
    "setuptools>=77",
    "wheel",
    "pybind11==3.0.4",
    "cmake",
]
build-backend = "setuptools.build_meta"

[project]
name = "pylunasvg"
version = "0.1.2"
description = "Bindings for lunasvg"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Eren Tekin", email = "erntkn4@gmail.com" }]
classifiers = [
    "Operating System :: POSIX :: Linux",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: MacOS :: MacOS X",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]

[project.optional-dependencies]
png = ["numpy", "Pillow"]

[project.urls]
Homepage = "https://github.com/erentknn/pylunasvg"
Repository = "https://github.com/erentknn/pylunasvg"

[project.scripts]
pylunasvg = "pylunasvg.__main__:main"

[tool.cibuildwheel]
test-command = 'python -c "import pylunasvg; print(pylunasvg.lunasvg_version_string())"'

[tool.ruff]
line-length = 120
target-version = "py311"
# Generated by pybind11-stubgen
extend-exclude = ["pylunasvg/pylunasvg.pyi"]

[tool.ruff.lint]
select = ["E", "F", "I"]
